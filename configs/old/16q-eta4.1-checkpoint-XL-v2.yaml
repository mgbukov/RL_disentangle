env_device: "cuda"
model_device: "cuda"
seed: 22

checkpoint:
  filepath: "logs/direct_16q_4000iters_XL_product_v2/checkpoint4000.pickle"
  use_policy_fn: True
  use_value_fn: False
  use_policy_optim: False
  use_value_optim: False
  use_triggers: False
  use_tracker: False

num_qubits: 16
num_iters: 4000
num_envs: 64
steps: 20
steps_limit: 160
epsi: 1e-3
obs_fn: rdm2m
fast_obs: True
fast_ents: True
reward_fn: relative_delta
stategen_fn: sample_from_mmap
stategen_params: [
  [filepaths, [
    "data/states/16q-2-eta4.1.npmm",
    "data/states/16q-3-eta4.1.npmm",
    "data/states/16q-4-eta4.1.npmm",
    ]],
  [num_states, [10000, 10000, 10000]]
]

pi_lr: 3e-6
vf_lr: 3e-6

discount: 0.99
batch_size: 512
clip_grad: 1.0
entropy_reg: 0.005
num_ppo_updates: 96

# Policy network parameters
transformer_layers: 8
attn_heads: 4
embed_dim: 256
dim_mlp: 1024

log_every: 100
checkpoint_every: 500
test_every: 500
test_min_subsystem_size: 2
test_max_subsystem_size: 4
num_tests: 20
trigger_every: 100000
triggers: []
triggers_levels: []
logdir_prefix: "checkpoint_"
logdir_suffix: "_XL_eta4.1"
